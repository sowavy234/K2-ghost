# Creality Knomi Hi Integration for K2 SE
# This file contains all necessary macros and configuration for Knomi Hi support
# Last Updated: v1.0.0

# ============================================
# KNOMI HI DISPLAY CONFIGURATION
# ============================================

[gcode_macro _KNOMI_INIT]
description: Initialize Knomi Hi display
gcode:
    SET_DISPLAY_TEXT TEXT="K2 SE Ready"
    UPDATE_DELAYED_GCODE ID=knomi_update DURATION=1

[delayed_gcode knomi_update]
gcode:
    {% if printer.idle_timeout.state == "Idle" %}
        SET_DISPLAY_TEXT TEXT="Ready"
    {% else %}
        SET_DISPLAY_TEXT TEXT="Printing"
    {% endif %}
    UPDATE_DELAYED_GCODE ID=knomi_update DURATION=5

# ============================================
# KNOMI HI MACRO - START PRINT
# ============================================

[gcode_macro KNOMI_PRINT_START]
description: Display print start on Knomi Hi
variable_bed_temp: 0
variable_extruder_temp: 0
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    SET_GCODE_VARIABLE MACRO=KNOMI_PRINT_START VARIABLE=bed_temp VALUE={BED_TEMP}
    SET_GCODE_VARIABLE MACRO=KNOMI_PRINT_START VARIABLE=extruder_temp VALUE={EXTRUDER_TEMP}
    SET_DISPLAY_TEXT TEXT="Heating {BED_TEMP}°C"
    M109 S{EXTRUDER_TEMP}
    M190 S{BED_TEMP}
    SET_DISPLAY_TEXT TEXT="Printing..."

# ============================================
# KNOMI HI MACRO - PRINT END
# ============================================

[gcode_macro KNOMI_PRINT_END]
description: Display print end on Knomi Hi
gcode:
    SET_DISPLAY_TEXT TEXT="Complete!"
    G4 P3000
    SET_DISPLAY_TEXT TEXT="Ready"

# ============================================
# KNOMI HI MACRO - PAUSE
# ============================================

[gcode_macro KNOMI_PAUSE]
description: Pause print and update Knomi Hi display
gcode:
    SET_DISPLAY_TEXT TEXT="PAUSED"
    PAUSE

# ============================================
# KNOMI HI MACRO - RESUME
# ============================================

[gcode_macro KNOMI_RESUME]
description: Resume print and update Knomi Hi display
gcode:
    SET_DISPLAY_TEXT TEXT="Resuming..."
    RESUME
    SET_DISPLAY_TEXT TEXT="Printing..."

# ============================================
# KNOMI HI MACRO - ERROR DISPLAY
# ============================================

[gcode_macro KNOMI_ERROR]
description: Display error message on Knomi Hi
gcode:
    {% set MSG = params.MSG|default("ERROR")|string %}
    SET_DISPLAY_TEXT TEXT="ERROR: {MSG}"

# ============================================
# KNOMI HI STATUS UPDATES
# ============================================

[gcode_macro UPDATE_KNOMI_STATUS]
description: Update Knomi Hi with current printer status
gcode:
    {% if printer.print_stats.state == "printing" %}
        {% set prog = (printer.virtual_sdcard.progress * 100)|int %}
        SET_DISPLAY_TEXT TEXT="P:{prog}% E:{printer.extruder.temperature|int}°C"
    {% elif printer.print_stats.state == "paused" %}
        SET_DISPLAY_TEXT TEXT="PAUSED"
    {% else %}
        SET_DISPLAY_TEXT TEXT="Ready - {printer.extruder.temperature|int}°C"
    {% endif %}

# ============================================
# END OF KNOMI HI CONFIGURATION
# ============================================
