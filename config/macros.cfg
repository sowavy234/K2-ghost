# ---- Auto Bed Leveling Section (DXC & Flatness) ----
[gcode_macro AUTO_BED_LEVEL]
gcode:
    M118 Leveling: Backing up current mesh...
    SAVE_CONFIG
    BED_MESH_CALIBRATE
    BED_MESH_PROFILE save=K2SE_LAST_MESH
    M118 Level: Bed mesh recalibrated and saved.

[gcode_macro CHECK_BED_FLATNESS]
gcode:
    M118 Checking bed flatness...
    BED_MESH_OUTPUT
    {% if printer["bed_mesh"].profile.mesh_max > 0.15 %}
      M300
      M118 WARNING: Bed is not flat! Max deviation: {printer["bed_mesh"].profile.mesh_max}
    {% else %}
      M118 Bed flatness within spec.
    {% endif %}

[gcode_macro SUPER_BED_LEVEL]
gcode:
    G28
    AUTO_BED_LEVEL
    CHECK_BED_FLATNESS

# ---- Adaptive Fan ----
[gcode_macro ADAPTIVE_FAN]
variable_last_temp: 0
gcode:
    {% set temp = printer['extruder'].temperature %}
    {% if temp > 210 %}
      M106 S255
      M118 Cooling: Full fan
    {% elif temp > 180 %}
      M106 S150
      M118 Cooling: Medium fan
    {% else %}
      M106 S50
      M118 Cooling: Low fan
    {% endif %}

# ---- True Flat Bed ----
[gcode_macro FLAT_BED_LEVEL]
gcode:
    M140 S60
    M104 S170
    G4 P30000
    G28
    BED_MESH_CALIBRATE
    CHECK_BED_FLATNESS
    {% if printer["bed_mesh"].profile.mesh_max > 0.10 %}
      M117 ERROR: Bed Not Flat. Please Re-Calibrate.
      M300
      CANCEL_PRINT
    {% endif %}
